<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Character Stats</title>
<style>
  :root{
    --page:#f4f6f8;
    --card:#ffffff;
    --text:#202124;
    --muted:#6b7280;
    --grid:#d7dce2;
    --accent:#4f7cff;
    --fill:rgba(79,124,255,.18);
  }

  *{box-sizing:border-box}

  body{
    margin:0;
    min-height:100vh;
    display:grid;
    place-items:center;
    padding:18px;
    background:var(--page);
    color:var(--text);
    font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  }

  .card{
    width:min(760px,100%);
    background:var(--card);
    border:1px solid #e3e6ea;
    border-radius:18px;
    padding:20px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
  }

  h1{
    margin:0;
    font-size:22px;
    text-align:center;
  }

  .subtitle{
    margin:5px 0 8px;
    color:var(--muted);
    font-size:13px;
    text-align:center;
  }

  canvas{
    width:100%;
    height:auto;
    display:block;
  }
</style>
</head>
<body>
  <div class="card">
    <h1>Character Stats</h1>
    <div class="subtitle">Fixed scale: 0–50</div>
    <canvas id="radar" width="720" height="580"></canvas>
  </div>

<script>
/*
  EDIT YOUR VALUES HERE.
  Keep each value between 0 and 50.
*/
const labels = [
  "Strength",
  "Stamina",
  "Discipline",
  "Endurance",
  "Intelligence"
];

const values = [
  2,
  2,
  2,
  2,
  2
];

const canvas = document.getElementById("radar");
const ctx = canvas.getContext("2d");

function clamp(value){
  return Math.max(0, Math.min(50, Number(value) || 0));
}

function point(cx, cy, radius, angle){
  return [
    cx + Math.cos(angle) * radius,
    cy + Math.sin(angle) * radius
  ];
}

function polygon(points, stroke, fill, width = 1){
  ctx.beginPath();

  points.forEach((p, index) => {
    if(index === 0){
      ctx.moveTo(p[0], p[1]);
    }else{
      ctx.lineTo(p[0], p[1]);
    }
  });

  ctx.closePath();

  if(fill){
    ctx.fillStyle = fill;
    ctx.fill();
  }

  ctx.strokeStyle = stroke;
  ctx.lineWidth = width;
  ctx.stroke();
}

function draw(){
  const width = canvas.width;
  const height = canvas.height;

  ctx.clearRect(0, 0, width, height);

  const cx = width / 2;
  const cy = height / 2 + 18;
  const maxRadius = Math.min(width, height) * 0.34;
  const count = labels.length;
  const startAngle = -Math.PI / 2;

  ctx.textAlign = "center";
  ctx.textBaseline = "middle";

  for(let ring = 1; ring <= 5; ring++){
    const radius = maxRadius * (ring / 5);
    const ringPoints = [];

    for(let i = 0; i < count; i++){
      ringPoints.push(
        point(cx, cy, radius, startAngle + i * 2 * Math.PI / count)
      );
    }

    polygon(ringPoints, "#d7dce2", null, 1);

    ctx.fillStyle = "#7a828c";
    ctx.font = "12px Inter, Arial, sans-serif";
    ctx.fillText(String(ring * 10), cx + 6, cy - radius + 12);
  }

  for(let i = 0; i < count; i++){
    const angle = startAngle + i * 2 * Math.PI / count;
    const outer = point(cx, cy, maxRadius, angle);

    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.lineTo(outer[0], outer[1]);
    ctx.strokeStyle = "#d7dce2";
    ctx.lineWidth = 1;
    ctx.stroke();

    const labelPoint = point(cx, cy, maxRadius + 42, angle);

    ctx.fillStyle = "#202124";
    ctx.font = "600 14px Inter, Arial, sans-serif";
    ctx.fillText(labels[i], labelPoint[0], labelPoint[1]);

    const valuePoint = point(cx, cy, maxRadius + 20, angle);

    ctx.fillStyle = "#6b7280";
    ctx.font = "12px Inter, Arial, sans-serif";
    ctx.fillText(`${clamp(values[i])}/50`, valuePoint[0], valuePoint[1]);
  }

  const dataPoints = values.map((value, i) => {
    const angle = startAngle + i * 2 * Math.PI / count;
    const radius = maxRadius * (clamp(value) / 50);
    return point(cx, cy, radius, angle);
  });

  polygon(
    dataPoints,
    "#4f7cff",
    "rgba(79,124,255,.18)",
    3
  );

  dataPoints.forEach(p => {
    ctx.beginPath();
    ctx.arc(p[0], p[1], 5, 0, Math.PI * 2);
    ctx.fillStyle = "#4f7cff";
    ctx.fill();
    ctx.strokeStyle = "#ffffff";
    ctx.lineWidth = 2;
    ctx.stroke();
  });
}

draw();
</script>
</body>
</html>
