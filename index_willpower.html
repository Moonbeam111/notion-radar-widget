<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Radar Stats</title>
<style>
:root{
  --bg:#ffffff;
  --text:#202124;
  --muted:#6b7280;
  --grid:#d8dde5;
  --accent:#4f7cff;
  --fill:rgba(79,124,255,.18);
}
*{box-sizing:border-box}
html,body{
  width:100%;
  height:100%;
  margin:0;
  overflow:hidden;
}
body{
  background:var(--bg);
  color:var(--text);
  font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
}
.widget{
  position:relative;
  width:100vw;
  height:100vh;
  min-height:360px;
  background:#fff;
}
.chart-wrap{
  position:absolute;
  inset:0;
  padding:6px;
}
canvas{
  width:100%;
  height:100%;
  display:block;
}
.settings-btn{
  position:absolute;
  top:10px;
  right:10px;
  z-index:10;
  border:1px solid #d7dce2;
  background:rgba(255,255,255,.96);
  color:#374151;
  border-radius:10px;
  padding:8px 10px;
  cursor:pointer;
  font-size:15px;
  box-shadow:0 2px 10px rgba(0,0,0,.08);
}
.settings-btn:hover{background:#f7f9fc}
.settings{
  position:absolute;
  top:52px;
  right:10px;
  z-index:9;
  width:min(420px,calc(100vw - 20px));
  max-height:0;
  opacity:0;
  overflow:hidden;
  background:rgba(255,255,255,.98);
  border:1px solid transparent;
  border-radius:14px;
  box-shadow:0 12px 30px rgba(0,0,0,.12);
  transition:max-height .25s ease,opacity .2s ease,border-color .2s ease;
}
.settings.open{
  max-height:520px;
  opacity:1;
  border-color:#e2e6eb;
}
.settings-inner{padding:14px}
.row{
  display:grid;
  grid-template-columns:110px 1fr 62px;
  gap:10px;
  align-items:center;
  margin:10px 0;
}
.row label{font-size:13px;font-weight:600}
input[type="range"]{width:100%;accent-color:var(--accent)}
input[type="number"]{
  width:62px;
  padding:7px 8px;
  border:1px solid #ccd2d9;
  border-radius:8px;
  background:#fff;
  color:var(--text);
}
.actions{
  display:flex;
  justify-content:flex-end;
  gap:8px;
  margin-top:12px;
}
.action{
  border:0;
  border-radius:9px;
  padding:9px 12px;
  font-weight:700;
  cursor:pointer;
}
.save{background:var(--accent);color:#fff}
.cancel{background:#eef1f5;color:#374151}
.note{
  margin-top:8px;
  text-align:center;
  font-size:11px;
  color:var(--muted);
}
@media(max-width:520px){
  .row{grid-template-columns:92px 1fr 56px}
}
</style>
</head>
<body>
<div class="widget" id="widget">
  <div class="chart-wrap">
    <canvas id="radar"></canvas>
  </div>

  <button class="settings-btn" id="settingsBtn" aria-expanded="false" title="Edit values">⚙️</button>

  <div class="settings" id="settingsPanel">
    <div class="settings-inner">
      <div id="controls"></div>
      <div class="actions">
        <button class="action cancel" id="cancelBtn">Cancel</button>
        <button class="action save" id="saveBtn">Save</button>
      </div>
      <div class="note">Values are saved in this browser.</div>
    </div>
  </div>
</div>

<script>
const labels = ["Strength","Stamina","Discipline","Endurance","Willpower"];
const defaults = [10,10,10,10,10];
let values = JSON.parse(localStorage.getItem("radar50Values") || "null") || defaults.slice();
let draft = values.slice();

const widget = document.getElementById("widget");
const canvas = document.getElementById("radar");
const ctx = canvas.getContext("2d");
const settingsBtn = document.getElementById("settingsBtn");
const settingsPanel = document.getElementById("settingsPanel");
const controls = document.getElementById("controls");

function clamp(v){
  return Math.max(0,Math.min(50,Number(v)||0));
}

labels.forEach((label,i)=>{
  const row=document.createElement("div");
  row.className="row";

  const name=document.createElement("label");
  name.textContent=label;

  const slider=document.createElement("input");
  slider.type="range";
  slider.min="0";
  slider.max="50";
  slider.step="1";

  const number=document.createElement("input");
  number.type="number";
  number.min="0";
  number.max="50";
  number.step="1";

  slider.addEventListener("input",()=>{
    draft[i]=clamp(slider.value);
    number.value=draft[i];
    draw(draft);
  });

  number.addEventListener("input",()=>{
    draft[i]=clamp(number.value);
    slider.value=draft[i];
    draw(draft);
  });

  row.append(name,slider,number);
  controls.appendChild(row);
});

function syncControls(){
  [...controls.querySelectorAll(".row")].forEach((row,i)=>{
    row.querySelector('input[type="range"]').value=draft[i];
    row.querySelector('input[type="number"]').value=draft[i];
  });
}

settingsBtn.addEventListener("click",()=>{
  const opening=!settingsPanel.classList.contains("open");
  if(opening){
    draft=values.slice();
    syncControls();
    draw(draft);
  }
  settingsPanel.classList.toggle("open",opening);
  settingsBtn.setAttribute("aria-expanded",String(opening));
});

document.getElementById("saveBtn").addEventListener("click",()=>{
  values=draft.map(clamp);
  localStorage.setItem("radar50Values",JSON.stringify(values));
  settingsPanel.classList.remove("open");
  settingsBtn.setAttribute("aria-expanded","false");
  draw(values);
});

document.getElementById("cancelBtn").addEventListener("click",()=>{
  draft=values.slice();
  syncControls();
  settingsPanel.classList.remove("open");
  settingsBtn.setAttribute("aria-expanded","false");
  draw(values);
});

function point(cx,cy,r,angle){
  return [cx+Math.cos(angle)*r,cy+Math.sin(angle)*r];
}

function polygon(points,stroke,fill,width=1){
  ctx.beginPath();
  points.forEach((p,i)=>i?ctx.lineTo(p[0],p[1]):ctx.moveTo(p[0],p[1]));
  ctx.closePath();
  if(fill){
    ctx.fillStyle=fill;
    ctx.fill();
  }
  ctx.strokeStyle=stroke;
  ctx.lineWidth=width;
  ctx.stroke();
}

function resizeCanvas(){
  const rect=canvas.getBoundingClientRect();
  const dpr=Math.max(1,window.devicePixelRatio||1);
  const pixelWidth=Math.max(1,Math.round(rect.width*dpr));
  const pixelHeight=Math.max(1,Math.round(rect.height*dpr));

  if(canvas.width!==pixelWidth || canvas.height!==pixelHeight){
    canvas.width=pixelWidth;
    canvas.height=pixelHeight;
  }

  ctx.setTransform(dpr,0,0,dpr,0,0);
  return {w:rect.width,h:rect.height};
}

function draw(sourceValues){
  const {w,h}=resizeCanvas();
  ctx.clearRect(0,0,w,h);

  const n=labels.length;
  const start=-Math.PI/2;

  // Use nearly all available space, while leaving room for labels.
  const labelRoom=Math.max(46,Math.min(w,h)*0.09);
  const maxR=Math.max(
    70,
    Math.min((w-labelRoom*2)/2,(h-labelRoom*2)/2)*0.98
  );

  const cx=w/2;
  const cy=h/2+Math.min(10,h*0.02);

  const fontScale=Math.max(11,Math.min(18,Math.min(w,h)/34));
  const smallFont=Math.max(10,fontScale-2);

  ctx.textAlign="center";
  ctx.textBaseline="middle";

  for(let ring=1;ring<=5;ring++){
    const r=maxR*(ring/5);
    const pts=[];
    for(let i=0;i<n;i++){
      pts.push(point(cx,cy,r,start+i*2*Math.PI/n));
    }
    polygon(pts,"#d8dde5",null,1);

    ctx.fillStyle="#7a828c";
    ctx.font=`${smallFont}px Inter, Arial, sans-serif`;
    ctx.fillText(String(ring*10),cx+5,cy-r+smallFont);
  }

  for(let i=0;i<n;i++){
    const angle=start+i*2*Math.PI/n;
    const outer=point(cx,cy,maxR,angle);

    ctx.beginPath();
    ctx.moveTo(cx,cy);
    ctx.lineTo(outer[0],outer[1]);
    ctx.strokeStyle="#d8dde5";
    ctx.lineWidth=1;
    ctx.stroke();

    const labelPoint=point(cx,cy,maxR+labelRoom*0.72,angle);
    ctx.fillStyle="#202124";
    ctx.font=`600 ${fontScale}px Inter, Arial, sans-serif`;
    ctx.fillText(labels[i],labelPoint[0],labelPoint[1]);

    const valuePoint=point(cx,cy,maxR+labelRoom*0.34,angle);
    ctx.fillStyle="#6b7280";
    ctx.font=`${smallFont}px Inter, Arial, sans-serif`;
    ctx.fillText(`${clamp(sourceValues[i])}/50`,valuePoint[0],valuePoint[1]);
  }

  const dataPoints=sourceValues.map((value,i)=>{
    const angle=start+i*2*Math.PI/n;
    const r=maxR*(clamp(value)/50);
    return point(cx,cy,r,angle);
  });

  polygon(dataPoints,"#4f7cff","rgba(79,124,255,.18)",3);

  const dotRadius=Math.max(4,Math.min(7,Math.min(w,h)/110));
  dataPoints.forEach(p=>{
    ctx.beginPath();
    ctx.arc(p[0],p[1],dotRadius,0,Math.PI*2);
    ctx.fillStyle="#4f7cff";
    ctx.fill();
    ctx.strokeStyle="#ffffff";
    ctx.lineWidth=2;
    ctx.stroke();
  });
}

const ro=new ResizeObserver(()=>draw(settingsPanel.classList.contains("open")?draft:values));
ro.observe(widget);
window.addEventListener("orientationchange",()=>setTimeout(()=>draw(values),100));
window.addEventListener("load",()=>draw(values));

syncControls();
draw(values);
</script>
</body>
</html>
